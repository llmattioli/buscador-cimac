<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSCADOR CIMAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="https://llmattioli.github.io/buscador-cimac/favicon.ico">
    <style>
        :root { --primary: #6c5ce7; --bg: #0b0b0d; --card: #15151a; --text: #f0f0f5; --accent: #1dd1a1; --purple: #a29bfe; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; padding: 0 15px 15px; }
        
        #login-screen, #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0b0d; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        #modal-overlay { background: rgba(0,0,0,0.9); z-index: 2000; display: none; }
        .login-card, .modal-card { text-align: center; width: 90%; max-width: 350px; background: var(--card); padding: 35px; border-radius: 20px; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .login-card img { width: 368px; margin-bottom: 25px; } 

        /* Estilo unificado para todos los inputs de la app */
        input { width: 100%; padding: 16px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: #fff; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; background: #222; box-shadow: 0 0 15px rgba(108, 92, 231, 0.2); }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.3s; position: relative; }
        button:active { transform: scale(0.96); }
        .btn-secondary { background: #222; color: #888; margin-top: 10px; }

        header { text-align: center; padding: 35px 0 10px; }
        header img { width: 300px; max-width: 80%; } 
        header h1 { font-size: 1.1rem; letter-spacing: 4px; color: var(--purple); margin: 5px 0 15px; text-transform: uppercase; font-weight: 600; }
        hr { border: 0; border-top: 2px solid #333; margin-bottom: 20px; }

        .search-area { position: sticky; top: -1px; z-index: 500; background: var(--bg); padding: 15px 0; border-bottom: 2px solid #222; }
        .search-container { display: flex; align-items: center; gap: 12px; }
        .residente-c { width: 0; opacity: 0; transition: 0.4s; overflow: hidden; display: flex; align-items: center; }
        .scrolled .residente-c { width: 45px; opacity: 1; }
        .residente-c img { width: 38px; min-width: 38px; }

        #app-screen { display: none; max-width: 480px; margin: 0 auto; }
        .nav-inner { display: flex; width: 100%; background: #1a1a1a; border-radius: 14px; padding: 4px; gap: 4px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 14px; text-align: center; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; color: #555; transition: 0.3s; letter-spacing: 1px; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3); }

        .result-card { background: var(--card); border-radius: 16px; padding: 25px; margin-bottom: 25px; border-left: 4px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.4); border-bottom: 1px solid #222; }
        .label { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; margin-bottom: 8px; display: block; }
        .val-header { font-size: 17px; font-weight: 600; color: #fff; margin-bottom: 12px; }
        .val-ip { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 15px; font-family: 'Courier New', monospace; }

        #pp-inputs { display: none; flex-direction: column; gap: 15px; flex: 1; }
        .touch-group { display: flex; align-items: center; background: #1a1a1a; border: 1px solid #333; border-radius: 14px; overflow: hidden; height: 55px; }
        .touch-btn { width: 55px; height: 100%; border: none; background: #222; color: #eee; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; margin: 0; border-radius: 0; padding: 0; }
        .touch-btn:active { background: var(--primary); color: white; }
        .touch-input { flex: 1; background: transparent !important; border: none !important; text-align: center; font-size: 18px; color: #fff; font-weight: bold; padding: 0 !important; margin: 0 !important; }

        .log-table { width: 100%; font-size: 11px; border-collapse: collapse; color: #aaa; margin-top: 10px; }
        .log-table th { color: var(--purple); text-align: left; padding: 10px 5px; border-bottom: 1px solid #333; font-size: 9px; text-transform: uppercase; }
        .log-table td { padding: 10px 5px; border-bottom: 1px solid #222; }

        .actions-bar { display: flex; justify-content: center; gap: 25px; border-top: 1px solid #222; padding-top: 25px; margin-top: 30px; }
        .action-btn { background: transparent; color: #555; border: none; font-size: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
        .empty-state { text-align: center; color: #444; margin-top: 50px; font-size: 14px; width: 100%; }
        .version-tag { font-size: 9px; color: #444; margin-top: 15px; letter-spacing: 1.5px; font-weight: 400; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <img src="https://llmattioli.github.io/buscador-cimac/logo.png" alt="Logo">
            <input type="text" id="email" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña" onkeypress="if(event.key==='Enter')handleLogin()">
            <button id="loginBtn" onclick="handleLogin()">INGRESAR AL SISTEMA</button>
            <div class="version-tag">v3.0.6</div>
        </div>
    </div>

    <div id="app-screen">
        <header><img src="https://llmattioli.github.io/buscador-cimac/logo.png" alt="Logo"><h1>BUSCADOR CIMAC</h1><hr><div class="nav-inner"><div id="tab-sw" class="tab-btn active" onclick="setMode('sw')">EQUIPOS</div><div id="tab-pp" class="tab-btn" onclick="setMode('pp')">PATCH PANELS</div><div id="tab-logs" class="tab-btn" style="display:none;" onclick="setMode('logs')">LOGS</div></div></header>
        <div class="search-area"><div class="search-container"><div class="residente-c"><img src="https://llmattioli.github.io/buscador-cimac/c.png" alt="Logo"></div><input type="text" id="searchInput" placeholder="Filtrar por cualquier dato..." onkeyup="filterData()"><div id="pp-inputs"><div style="display:flex; gap:10px;"><div class="touch-group" style="flex:1;"><button class="touch-btn" onclick="stepVal('ppNum', -1)">-</button><input type="number" id="ppNum" class="touch-input" placeholder="N° PP" oninput="filterData()"><button class="touch-btn" onclick="stepVal('ppNum', 1)">+</button></div><div class="touch-group" style="flex:1;"><button class="touch-btn" onclick="stepVal('portNum', -1)">-</button><input type="number" id="portNum" class="touch-input" placeholder="Puerto" oninput="filterData()"><button class="touch-btn" onclick="stepVal('portNum', 1)">+</button></div></div></div></div></div>
        <div id="results"></div>
        <div class="actions-bar"><button class="action-btn" onclick="openPassModal()">Cambiar Contraseña</button><button class="action-btn" onclick="logout()">Cerrar Sesión</button></div>
    </div>

    <div id="modal-overlay"><div class="modal-card"><h3 style="color:var(--purple); margin-top:0;">Nueva Contraseña</h3><input type="password" id="newPass" placeholder="Nueva Contraseña"><input type="password" id="confirmPass" placeholder="Confirmar Contraseña"><button onclick="handlePassChange()">GUARDAR CAMBIOS</button><button class="btn-secondary" onclick="closePassModal()">CANCELAR</button></div></div>

    <script>
        window.onscroll = () => { document.body.classList.toggle("scrolled", window.scrollY > 120); };
        const API_URL = "https://script.google.com/macros/s/AKfycbxHzTfBLPL4p9CKl-TfNYRibayPQBgaBW0N9ApUCn5UTGyMjwNApkYvLeklfjVONF8e/exec";
        let inventoryData = [], ppData = [], logData = [], currentMode = 'sw', userRole = "", userEmail = "", userIP = "Desconocida";
        function stepVal(id, step) { const el = document.getElementById(id); let val = parseInt(el.value) || 0; val += step; if (val < 1) el.value = ""; else el.value = val; filterData(); }
        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => userIP = d.ip).catch(e => console.log("IP-err"));
        window.onload = () => { if (localStorage.getItem('cimac_session_active')) { userRole = localStorage.getItem('cimac_role'); userEmail = localStorage.getItem('cimac_user_email'); showApp(); } };
        async function handleLogin() {
            const eb = document.getElementById('email').value.trim(), pb = document.getElementById('password').value.trim(); if (!eb || !pb) return;
            const btn = document.getElementById('loginBtn'); btn.disabled = true; btn.innerText = "ACCEDIENDO...";
            try {
                const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "login", email: eb, password: pb, ip: userIP }) });
                const res = await resp.json();
                if (res.status === "success") { localStorage.setItem('cimac_session_active', 'true'); localStorage.setItem('cimac_role', res.user.role || 'USER'); localStorage.setItem('cimac_user_email', eb); userRole = res.user.role; userEmail = eb; showApp(); } else { alert(res.message); btn.disabled = false; btn.innerText = "INGRESAR AL SISTEMA"; }
            } catch (e) { alert("Error de conexión"); btn.disabled = false; btn.innerText = "INGRESAR AL SISTEMA"; }
        }
        function showApp() { document.getElementById('login-screen').style.display='none'; document.getElementById('app-screen').style.display='block'; if (userRole === "ADMIN") document.getElementById('tab-logs').style.display='block'; fetchData(); }
        async function fetchData() {
            try { const r1 = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getData" }) }); inventoryData = (await r1.json()).data || []; const r2 = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getPPData" }) }); ppData = (await r2.json()).data || []; } catch (e) { console.error("Error-Fetch"); }
        }
        function setMode(mode) {
            currentMode = mode; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('tab-' + mode).classList.add('active');
            document.getElementById('searchInput').style.display = (mode === 'pp' ? 'none' : 'block'); document.getElementById('pp-inputs').style.display = (mode === 'pp' ? 'flex' : 'none');
            document.getElementById('results').innerHTML = '<div class="empty-state">Ingresa datos para filtrar...</div>';
            if (mode === 'logs') { document.getElementById('results').innerHTML = '<div class="empty-state">Cargando registros...</div>'; fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getLogs" }) }).then(r => r.json()).then(res => { logData = res.data; filterData(); }); } else { filterData(); }
        }
        function filterData() {
            const t = document.getElementById('searchInput').value.toLowerCase().trim();
            if (currentMode === 'sw') { renderResults(t === "" ? [] : inventoryData.filter(i => Object.values(i).some(v => String(v).toLowerCase().includes(t)))); } else if (currentMode === 'pp') { const pp = document.getElementById('ppNum').value, pt = document.getElementById('portNum').value; if (!pp) return renderResults(ppData); const sID = `PP${pp.padStart(2, '0')}${pt ? '_' + pt.padStart(2, '0') : ''}`; renderResults(ppData.filter(i => String(Object.values(i)[0]).toUpperCase().startsWith(sID.toUpperCase()))); } else if (currentMode === 'logs') { renderLogs(t === "" ? logData : logData.filter(l => l.some(v => String(v).toLowerCase().includes(t)))); }
        }
        function renderResults(data) {
            const container = document.getElementById('results'); if (data.length === 0) return container.innerHTML = '<div class="empty-state">Sin resultados</div>'; container.innerHTML = "";
            data.forEach(item => {
                const card = document.createElement('div'); card.className = 'result-card';
                if (currentMode === 'sw') { const h = [item.equipo, item.id, item.usuario].filter(v => v).join(" / "); let sw="-", pp="-"; for(let k in item){ if(k.includes('sw')) sw=item[k]; if(k.includes('pp')) pp=item[k]; } card.innerHTML = `<div class="field"><span class="label">EQUIPO / USUARIO</span><div class="val-header">${h}</div></div><div class="field"><span class="label">IP | MAC</span><div class="val-ip" style="font-size:16px;">${item.ip || '-'} <span style="color:#666; font-weight:normal;">| ${item.mac || '-'}</span></div></div><div class="field"><span class="label">CONEXIÓN RED</span><div style="font-size:14px; color:#aaa;">SW: ${sw} | PP: ${pp}</div></div>`; }
                else { const v = Object.values(item); card.innerHTML = `<div class="field"><span class="label">IDENTIFICADOR</span><div class="val-header">${v[0]}</div></div><div class="field"><span class="label">DETALLE PUERTO</span><div class="val-ip" style="font-size:16px;">${[v[1], v[2], v[3]].filter(v=>v).join(" / ")}</div></div>`; }
                container.appendChild(card);
            });
        }
        function renderLogs(logs) {
            const container = document.getElementById('results'); if (!logs || logs.length === 0) return container.innerHTML = '<div class="empty-state">Sin registros</div>';
            let html = '<table class="log-table"><tr><th>FECHA</th><th>USUARIO</th><th>ESTADO</th><th>IP</th></tr>';
            logs.forEach(l => { const s = l[2] === "EXITOSO" ? "#1dd1a1" : "#ff7675"; html += `<tr><td>${new Date(l[0]).toLocaleString('es-AR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}</td><td>${l[1]}</td><td style="color:${s}">${l[2]}</td><td>${l[3] || '-'}</td></tr>`; });
            container.innerHTML = html + '</table>';
        }
        function openPassModal() { document.getElementById('modal-overlay').style.display='flex'; }
        function closePassModal() { document.getElementById('modal-overlay').style.display='none'; }
        async function handlePassChange() { const n = document.getElementById('newPass').value, c = document.getElementById('confirmPass').value; if (n && n===c) { fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "changePassword", email: userEmail, newPassword: n }) }).then(() => { alert("¡Listo!"); closePassModal(); }); } else { alert("Las contraseñas no coinciden"); } }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
