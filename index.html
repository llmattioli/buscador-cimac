<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSCADOR CIMAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6c5ce7; --bg: #0f0f12; --card: #1c1c21; --text: #f0f0f5; --accent: #a29bfe; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        /* --- LOGIN --- */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at top right, #2d3436, var(--bg)); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: rgba(28, 28, 33, 0.8); backdrop-filter: blur(15px); padding: 40px; border-radius: 24px; width: 90%; max-width: 380px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .login-card img { max-width: 200px; margin-bottom: 24px; }
        input { width: 100%; padding: 14px; margin: 12px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: var(--primary); outline: none; }
        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 16px; }

        /* --- APP --- */
        #app-screen { display: none; padding: 20px; max-width: 600px; margin: 0 auto; box-sizing: border-box; }
        header { text-align: center; padding: 20px 0; }
        header img { max-width: 180px; }
        header h1 { font-size: 1.2rem; letter-spacing: 4px; color: var(--accent); margin-top: 15px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 15px; font-weight: 600; }
        
        .search-area { position: sticky; top: 0; z-index: 100; padding: 15px 0; background: var(--bg); }
        .result-card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 16px; border-left: 4px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.2); animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .label { font-size: 10px; color: #a0a0b0; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
        .value { font-size: 16px; font-weight: 500; color: #fff; word-break: break-all; margin-bottom: 12px; font-family: 'Outfit', sans-serif; }
        .value.mono { font-family: monospace; color: var(--accent); font-size: 15px; }
        
        .loader { display: none; text-align: center; color: var(--accent); margin: 20px 0; font-weight: 300; }
        #logout-btn { background: transparent; color: #555; border: 1px solid #333; font-size: 11px; padding: 6px 12px; margin-top: 40px; width: auto; cursor: pointer; }
        #error-msg { color: #ff7675; font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <img src="https://cimacnet.com.ar/wp-content/uploads/2021/08/cimacnet-logo-blanco.png" alt="Creatic Logo">
            <input type="text" id="email" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="handleLogin()">INGRESAR AL SISTEMA</button>
            <div id="error-msg">Credenciales incorrectas</div>
        </div>
    </div>

    <div id="app-screen">
        <header>
            <img src="https://cimacnet.com.ar/wp-content/uploads/2021/08/cimacnet-logo-blanco.png" alt="Creatic Logo">
            <h1>BUSCADOR CIMAC</h1>
        </header>

        <div class="search-area">
            <input type="text" id="searchInput" placeholder="Buscar MAC, IP, Dispositivo..." onkeyup="filterData()">
        </div>

        <div id="loader" class="loader">Un momento, sincronizando con la nube...</div>
        <div id="results"></div>

        <div style="text-align: center;">
            <button id="logout-btn" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxHzTfBLPL4p9CKl-TfNYRibayPQBgaBW0N9ApUCn5UTGyMjwNApkYvLeklfjVONF8e/exec";
        let inventoryData = [];

        window.onload = () => {
            if (localStorage.getItem('cimac_session')) showApp();
        };

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');

            if (!email || !password) return;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Para evitar problemas de CORS en algunos navegadores
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: "login", email, password })
                });
                
                // Debido a que 'no-cors' no nos deja ver el body, usamos un artificio o confiamos en el login exitoso.
                // Pero lo ideal es usar el login normal. Vamos a intentar el normal primero:
                const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "login", email, password }) });
                const res = await resp.json();

                if (res.status === "success") {
                    localStorage.setItem('cimac_session', JSON.stringify(res.user));
                    showApp();
                } else {
                    errorEl.style.display = 'block';
                }
            } catch (e) {
                // Si falla por CORS, el usuario igual verá el error en consola, pero intentamos notificarle
                errorEl.innerText = "Error de conexión o credenciales";
                errorEl.style.display = 'block';
            }
        }

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            fetchData();
        }

        async function fetchData() {
            const loader = document.getElementById('loader');
            loader.style.display = 'block';
            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getData" }) });
                const result = await response.json();
                inventoryData = result.data;
                renderResults(inventoryData);
            } catch (e) {
                alert("Error de sincronización.");
            } finally {
                loader.style.display = 'none';
            }
        }

        function renderResults(data) {
            const container = document.getElementById('results');
            container.innerHTML = "";
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div class="field"><span class="label">SWITCH / PUERTO</span><div class="value">${item.switch || 'N/A'} - P:${item.patch || '??'}</div></div>
                    <div class="field"><span class="label">USUARIO / EQUIPO</span><div class="value">${item.usuario || 'Desconocido'}</div></div>
                    <div class="field"><span class="label">DIRECCIÓN MAC</span><div class="value mono">${item.mac || '-'}</div></div>
                    <div class="field"><span class="label">DIRECCIÓN IP</span><div class="value mono">${item.ip || '-'}</div></div>
                `;
                container.appendChild(card);
            });
        }

        function filterData() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = inventoryData.filter(i => Object.values(i).some(v => String(v).toLowerCase().includes(term)));
            renderResults(filtered);
        }

        function logout() {
            localStorage.removeItem('cimac_session');
            location.reload();
        }
    </script>
</body>
</html>
