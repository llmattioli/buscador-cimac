<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSCADOR CIMAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --bg: #0b0b0d;
            --card: #15151a;
            --text: #f0f0f5;
            --accent: #1dd1a1;
            --purple: #a29bfe;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            padding: 15px;
        }

        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0b0b0d;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-card {
            text-align: center;
            width: 100%;
            max-width: 320px;
        }

        .login-card img {
            width: 180px;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
        }

        button#login-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }

        #app-screen {
            display: none;
            max-width: 480px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 10px 0;
        }

        .logo-header {
            width: 140px;
            margin-bottom: 5px;
        }

        header h1 {
            font-size: 1.1rem;
            letter-spacing: 4px;
            color: var(--purple);
            margin: 5px 0 15px;
            text-transform: uppercase;
            font-weight: 600;
        }

        hr {
            border: 0;
            border-top: 1px solid #1f1f24;
            margin-bottom: 25px;
        }

        .search-area {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 10px 0;
            background: var(--bg);
        }

        #searchInput {
            border: 1.5px solid #3d3d4d;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.1);
        }

        #searchInput:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.3);
        }

        .result-card {
            background: var(--card);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            animation: fadeIn 0.4s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .label {
            font-size: 10px;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }

        .val-header {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 12px;
            font-family: 'Courier New', monospace;
        }

        .val-ip {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 18px;
            font-family: 'Courier New', monospace;
        }

        .val-mono {
            font-size: 16px;
            color: #ddd;
            margin-bottom: 16px;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
        }

        #results {
            margin-top: 20px;
        }

        .empty-state {
            text-align: center;
            color: #333;
            margin-top: 40px;
            font-size: 13px;
            letter-spacing: 1px;
        }

        #logout-btn {
            display: block;
            border: none;
            background: transparent;
            color: #444;
            font-size: 10px;
            margin: 50px auto;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>

    <div id="login-screen">
        <div class="login-card">
            <img src="https://cimacnet.com.ar/wp-content/uploads/2021/08/cimacnet-logo-blanco.png" alt="Logo">
            <input type="text" id="email" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <button id="login-btn" onclick="handleLogin()">INGRESAR AL SISTEMA</button>
            <div id="error-msg" style="color:#ff7675; margin-top:15px; display:none; font-size:13px;">Credenciales
                incorrectas</div>
        </div>
    </div>

    <div id="app-screen">
        <header>
            <img class="logo-header" src="https://cimacnet.com.ar/wp-content/uploads/2021/08/cimacnet-logo-blanco.png"
                alt="Logo">
            <h1>BUSCADOR CIMAC</h1>
        </header>
        <hr>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="Escribe búsqueda..." onkeyup="filterData()">
        </div>
        <div id="loader" style="display:none; text-align:center; color:var(--purple); margin:20px; font-size:12px;">
            BUSCANDO...</div>
        <div id="results">
            <div class="empty-state">Ingresa término para buscar</div>
        </div>
        <button id="logout-btn" onclick="logout()">Cerrar Sesión</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxHzTfBLPL4p9CKl-TfNYRibayPQBgaBW0N9ApUCn5UTGyMjwNApkYvLeklfjVONF8e/exec";
        let inventoryData = [];

        window.onload = () => { if (localStorage.getItem('cimac_session_active')) showApp(); };

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) return;
            try {
                const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "login", email, password }) });
                const res = await resp.json();
                if (res.status === "success") { localStorage.setItem('cimac_session_active', 'true'); showApp(); }
                else { document.getElementById('error-msg').style.display = 'block'; }
            } catch (e) { alert("Error de conexión"); }
        }

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            fetchData();
        }

        async function fetchData() {
            document.getElementById('loader').style.display = 'block';
            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getData" }) });
                const result = await response.json();
                inventoryData = result.data;
            } catch (e) { console.error(e); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function renderResults(data) {
            const container = document.getElementById('results');
            const searchVal = document.getElementById('searchInput').value.trim();
            if (searchVal === "" || data.length === 0) {
                container.innerHTML = '<div class="empty-state">Sin resultados...</div>';
                return;
            }
            container.innerHTML = "";
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'result-card';

                // Mapeo exacto de cabeceras
                let sw = "-", pp = "-";
                for (let k in item) {
                    if (k.toLowerCase().includes("sw")) sw = item[k];
                    if (k.toLowerCase().includes("pp")) pp = item[k];
                }

                card.innerHTML = `
                    <div class="field"><span class="label">USUARIO / EQUIPO</span><div class="val-header">${item.usuario || '-'} / ${item.puesto || '-'}</div></div>
                    <div class="field"><span class="label">DIRECCIÓN IP</span><div class="val-ip">${item.ip || '-'}</div></div>
                    <div class="field"><span class="label">SWITCH PORT</span><div class="val-normal">${sw}</div></div>
                    <div class="field"><span class="label">PATCH PANEL</span><div class="val-normal">${pp}</div></div>
                    <div class="field"><span class="label">DIRECCIÓN MAC</span><div class="val-normal">${item.mac || '-'}</div></div>
                `;
                container.appendChild(card);
            });
        }

        function filterData() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            if (term === "") { renderResults([]); return; }
            const filtered = inventoryData.filter(i => Object.values(i).some(v => String(v).toLowerCase().includes(term)));
            renderResults(filtered);
        }

        function logout() { localStorage.removeItem('cimac_session_active'); location.reload(); }
    </script>
</body>

</html>
