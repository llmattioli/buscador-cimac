<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSCADOR CIMAC</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --bg: #0f0f12;
            --card: #1c1c21;
            --text: #f0f0f5;
            --accent: #00d2d3;
            --purple: #a29bfe;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            padding: 10px;
        }

        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f0f12;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-card {
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        input {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid var(--primary);
            border-radius: 12px;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }

        button#login-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        #app-screen {
            display: none;
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 20px 0;
        }

        .logo-main {
            width: 160px;
            margin-bottom: 5px;
        }

        header h1 {
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: var(--purple);
            margin: 10px 0;
            text-transform: uppercase;
            font-weight: 600;
        }

        hr {
            border: 0;
            border-top: 1px solid #222;
            margin-bottom: 30px;
        }

        .search-area {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 10px 0;
            background: var(--bg);
        }

        #searchInput {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(108, 92, 231, 0.2);
        }

        .result-card {
            background: var(--card);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }

        .val-u {
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
        }

        .val-i {
            font-size: 18px;
            font-weight: 700;
            color: #1dd1a1;
            margin-bottom: 18px;
            font-family: 'Courier New', monospace;
        }

        .val-normal {
            font-size: 16px;
            color: #eee;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
        }

        .empty-state {
            text-align: center;
            color: #444;
            margin-top: 50px;
        }

        #logout-link {
            display: block;
            text-align: center;
            color: #333;
            font-size: 10px;
            margin-top: 40px;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
